<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuthX</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='design.css') }}">
</head>
<body>

    <div class="navbar">
        <div class="logo">AuthX</div>
        <div class="nav-links">
            {% if session.get('user_id') %}
                <span style="color: white; margin-right: 15px;">{{ session.get('email') }}</span>
                <a href="/logout" class="nav-btn logout">Deconectare</a>
            {% endif %}
        </div>
    </div>

    <div class="container">
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert {% if category == 'success' %}success{% endif %}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}
        {% endblock %}

    </div>

</body>
</html>
